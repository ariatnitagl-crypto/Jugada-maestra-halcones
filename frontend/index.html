<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Halcones - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <!-- Navbar -->
    <nav class="bg-emerald-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">Jugada Maestra ⚽</h1>
            <span>Bienvenido, Don Rafa</span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <!-- KPI Cards (Respuesta a Pregunta 3) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="finanzas">
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-emerald-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Ingresos este mes</h3>
                <p class="text-3xl font-bold text-gray-800" id="ingreso-actual">Cargando...</p>
                <span class="text-emerald-500 text-sm font-medium" id="comparativa-finanzas"></span>
            </div>
            <!-- KPI Asistencia (Respuesta a Pregunta 2) -->
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Asistencia Promedio</h3>
                <div id="asistencia-lista" class="mt-2 text-gray-700 font-medium">Cargando...</div>
            </div>
        </div>

        <!-- Tabla de Pagos (Respuesta a Pregunta 1) -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 bg-gray-50 border-b">
                <h2 class="text-lg font-bold text-gray-700">Estado de Pagos - Junio</h2>
            </div>
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 text-sm uppercase">
                        <th class="p-4">Jugador</th>
                        <th class="p-4">Categoría</th>
                        <th class="p-4">Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-pagos">
                    <!-- Los datos aparecerán aquí -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
